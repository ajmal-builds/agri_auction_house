name: agri_auction_house
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.5
  firebase_storage: ^11.6.5
  firebase_messaging: ^14.7.10

  # Location & Maps
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.1

  # UI
  cupertino_icons: ^1.0.6
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0

  # Image & network
  image_picker: ^1.0.7
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/spices_bg.jpg